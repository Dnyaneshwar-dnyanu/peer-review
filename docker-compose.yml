services:
  mongodb:
    image: mongo:latest
    volumes:
      - mongo-data:/data/db

  backend:
    build: ./backend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - MONGO_URL=mongodb://mongodb:27017/peer-review
      - PORT=3000
      - NODE_ENV=production
      - FRONTEND_URL=http://localhost
      - JWT_KEY=${JWT_KEY}
    depends_on:
      - mongodb

volumes:
  mongo-data:
