services:
  backend:
    build: ./backend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - MONGO_URL=mongodb://mongodb:27017/peer-review
      - PORT=3000
      - NODE_ENV=production
      - FRONTEND_URL=http://localhost
      - JWT_KEY=my_super_secret_key_123  # <--- Added this
    depends_on:
      - mongodb

  frontend:
    build: ./frontend
    restart: always
    ports:
      - "80:80"
    environment:
      - VITE_REACT_APP_BACKEND_URL=/api
    depends_on:
      - backend

  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data:
