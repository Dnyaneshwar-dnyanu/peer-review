services:
  mongodb:
    image: mongo:7.0
    restart: always
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - MONGO_URI=mongodb://mongodb:27017/peer-review
      - PORT=3000
      - NODE_ENV=production
      - FRONTEND_URL=http://localhost:8080
      - CORS_ORIGINS=http://localhost:8080
      - JWT_KEY=${JWT_KEY:-secret_fallback_for_dev_only}
    depends_on:
      mongodb:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        - VITE_REACT_APP_BACKEND_URL=http://localhost:3000
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      backend:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 3s
      retries: 3

volumes:
  mongo-data:
