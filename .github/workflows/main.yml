name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend:
    name: Backend CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: backend/package.json
      - name: Install dependencies
        run: npm install
        working-directory: backend
      - name: Run tests
        run: npm test
        working-directory: backend
        env:
          NODE_ENV: test

  frontend:
    name: Frontend CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package.json
      - name: Install dependencies
        run: npm install
        working-directory: frontend
      - name: Run lint
        run: npm run lint
        working-directory: frontend
        continue-on-error: true
      - name: Run tests
        run: npm test
        working-directory: frontend
      - name: Build
        run: npm run build
        working-directory: frontend
