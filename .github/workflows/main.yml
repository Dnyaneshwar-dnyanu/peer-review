name: CI/CD Pipeline

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Permissions needed to push to GitHub Container Registry
permissions:
  contents: read
  packages: write

jobs:
  security-audit:
    name: Security - Audit & Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: |
            backend/package.json
            frontend/package.json

      - name: Backend - Install & Audit
        run: |
          npm ci
          npm audit --audit-level=high || true
        working-directory: backend

      - name: Frontend - Install & Audit
        run: |
          npm ci
          npm audit --audit-level=high || true
        working-directory: frontend

      - name: Build backend image for scanning
        run: |
          docker build -t peer-review-backend:ci ./backend

      - name: Scan backend image (Trivy)
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: peer-review-backend:ci
          severity: 'HIGH,CRITICAL'
          exit-code: '1'
          ignore-unfixed: true

  test-backend:
    name: Backend - Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: backend/package.json

      - name: Backend - Install & Test
        run: |
          npm ci
          npm test
        working-directory: backend
        env:
          NODE_ENV: test

  test-frontend:
    name: Frontend - Lint, Test & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: frontend/package.json

      - name: Frontend - Install, Lint, Test & Build
        run: |
          npm ci
          npm run lint
          npm test
          npm run build
        working-directory: frontend

  build-and-push-backend:
    name: Backend - Build & Push Docker Image
    needs: [test-backend, test-frontend, security-audit]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Backend
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/peer-review-backend

      - name: Build and push Backend Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}

  deploy-backend:
    name: Backend - Trigger Render Deployment
    needs: build-and-push-backend
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Call Render Deploy Hook
        run: |
          curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK }}

      - name: Verify deployment health
        env:
          HEALTH_URL: ${{ secrets.BACKEND_HEALTH_URL }}
        run: |
          if [ -z "$HEALTH_URL" ]; then
            echo "BACKEND_HEALTH_URL is not set"
            exit 1
          fi

          for i in {1..20}; do
            code=$(curl -s -o /dev/null -w "%{http_code}" "$HEALTH_URL/healthz")
            if [ "$code" = "200" ]; then
              echo "Deployment is healthy"
              exit 0
            fi
            echo "Waiting for health check... ($i)"
            sleep 10
          done

          echo "Health check failed"
          exit 1
